<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeMeds — Register</title>
    <link rel="stylesheet" href="../css/signup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="login-card">
      <form id="register-form">
        <h1>REGISTER</h1>
        <p id="auth-message" class="auth-message" hidden></p>
        <input
          id="email"
          type="email"
          class="input-field"
          placeholder="email"
          autocomplete="email"
          required
        /><br />
        <input
          id="password"
          type="password"
          class="input-field"
          placeholder="password"
          autocomplete="new-password"
          required
        /><br />
        <input
          id="confirm-password"
          type="password"
          class="input-field"
          placeholder="confirm password"
          autocomplete="new-password"
          required
        /><br />
        <button type="submit" id="register-btn" class="login-btn">Create Account</button>

        <p>Already have an account? <a href="signup.html">Login</a></p>
        <div class="divider">OR SIGN UP WITH</div>
        <div>
          <button type="button" id="google-btn" class="google-btn">
            <i class="fa-brands fa-google"></i>Google
          </button>
        </div>
      </form>
    </main>
    <script type="module" src="../js/register.js"></script>
  </body>
</html>
